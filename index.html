<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>באמצע — נפגשים באמצע הדרך</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f55a;
    --accent2: #5af5c8;
    --text: #f0f0f0;
    --text-muted: #666;
    --danger: #ff5a5a;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- HEADER ---- */
  header {
    padding: 28px 40px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo-dot {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  /* ---- LAYOUT ---- */
  .app {
    display: grid;
    grid-template-columns: 420px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 28px 28px 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ---- PERSON CARDS ---- */
  .persons-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 28px;
    margin-top: 16px;
  }

  .person-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
    position: relative;
  }

  .person-card:hover { border-color: #3a3a3a; }

  .person-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: #000;
  }

  .person-info { flex: 1; min-width: 0; }

  .person-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .person-address {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }

  .remove-btn:hover { color: var(--danger); background: rgba(255,90,90,0.1); }

  /* ---- ADD PERSON FORM ---- */
  .add-form {
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  .btn-add-person {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    cursor: pointer;
    text-align: right;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-add-person:hover { border-color: var(--accent); color: var(--accent); }

  /* ---- FIND BUTTON ---- */
  .find-wrap {
    padding: 20px 28px 28px;
    margin-top: auto;
  }

  .btn-find {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-find:hover { transform: translateY(-1px); background: #d4ff6a; }
  .btn-find:active { transform: translateY(0); }
  .btn-find:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

  /* ---- RESULTS ---- */
  .results-section {
    padding: 20px 28px 0;
  }

  .place-type-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .filter-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 28px;
  }

  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .result-card:hover { border-color: var(--accent2); transform: translateX(-2px); }
  .result-card.active { border-color: var(--accent); }

  .result-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .result-address {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .rating {
    font-size: 12px;
    color: #ffd700;
    font-weight: 600;
  }

  .tag {
    font-size: 10px;
    background: rgba(200,245,90,0.1);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 600;
  }

  .directions-btn {
    margin-top: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .directions-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ---- MAP ---- */
  #map {
    width: 100%;
    height: 100%;
    background: #111;
  }

  /* ---- LOADING ---- */
  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .loading.show { display: flex; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    padding: 30px 28px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* ---- API KEY BANNER ---- */
  .api-banner {
    background: rgba(200,245,90,0.08);
    border: 1px solid rgba(200,245,90,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--accent);
    margin: 16px 28px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* scrollbar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* autocomplete dropdown override */
  .pac-container {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    font-family: 'Heebo', sans-serif !important;
    margin-top: 4px !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
  }
  .pac-item {
    color: var(--text) !important;
    border-top: 1px solid var(--border) !important;
    padding: 8px 14px !important;
    font-size: 13px !important;
  }
  .pac-item:hover { background: var(--surface) !important; }
  .pac-item-query { color: var(--text) !important; }
  .pac-matched { color: var(--accent) !important; font-weight: 600 !important; }
  .hdpi.pac-logo:after, .pac-logo:after { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo-dot">📍</div>
  <h1>ב<span>אמצע</span> — נפגשים באמצע הדרך</h1>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="api-banner" id="apiBanner">
      ⚠️ יש להחליף את YOUR_API_KEY בראש הקוד במפתח Google Maps אמיתי
    </div>

    <div class="sidebar-section" style="margin-top:20px">
      <div class="section-label">משתתפים</div>
    </div>

    <div class="persons-list" id="personsList"></div>

    <!-- ADD PERSON -->
    <div class="add-form" id="addForm">
      <div class="input-group">
        <div class="input-label">שם (אופציונלי)</div>
        <input type="text" id="personName" placeholder="למשל: דנה" />
      </div>
      <div class="input-group">
        <div class="input-label">כתובת</div>
        <div class="input-wrap">
          <input type="text" id="addressInput" placeholder="הכניסי כתובת..." autocomplete="off" />
        </div>
      </div>
      <button class="btn-add-person" onclick="addPerson()">
        <span>＋</span> הוסף משתתף
      </button>
    </div>

    <!-- FIND -->
    <div class="find-wrap">
      <button class="btn-find" id="findBtn" onclick="findMeetingPoint()" disabled>
        🔍 מצאי מקום מפגש
      </button>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      מחפשת מקומות מתאימים...
    </div>

    <!-- RESULTS -->
    <div class="results-section" id="resultsSection" style="display:none">
      <div class="section-label">מקומות מוצעים</div>
      <div class="place-type-filter" id="filterChips"></div>
      <div class="results-list" id="resultsList"></div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🌐</div>
      לא נמצאו מקומות באזור זה.<br>נסי להרחיב את הרדיוס.
    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<!-- ===================== REPLACE YOUR_API_KEY BELOW ===================== -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB1cGE0KbgyWaWFTLrRBjqO5h0L3SP5ygQ&libraries=places&language=he&callback=initApp" async defer></script>
<!-- ==================================================================== -->

<script>
const AVATAR_COLORS = ['#c8f55a','#5af5c8','#f55a8c','#f5c85a','#5a8cf5','#f55ac8'];
const PLACE_TYPE_ICONS = {
  cafe: '☕', restaurant: '🍽️', bar: '🍷', park: '🌳',
  shopping_mall: '🛍️', museum: '🏛️', movie_theater: '🎬',
  gym: '💪', default: '📍'
};

let map, service, persons = [], markers = [], resultMarkers = [];
let midMarker = null, currentPlaces = [], activeFilter = 'הכל';

function initApp() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 31.7683, lng: 35.2137 }, // Jerusalem default
    zoom: 12,
    styles: darkMapStyle(),
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
  });

  service = new google.maps.places.PlacesService(map);

  // Autocomplete
  const autocomplete = new google.maps.places.Autocomplete(
    document.getElementById('addressInput'),
    { types: ['geocode', 'establishment'] }
  );

  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (place.geometry) {
      document.getElementById('addressInput').dataset.lat = place.geometry.location.lat();
      document.getElementById('addressInput').dataset.lng = place.geometry.location.lng();
      document.getElementById('addressInput').dataset.name = place.name || place.formatted_address;
    }
  });

  document.getElementById('addressInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') e.preventDefault();
  });

  document.getElementById('apiBanner').style.display = 'none';

  renderPersons();
}

function addPerson() {
  const input = document.getElementById('addressInput');
  const nameInput = document.getElementById('personName');
  const lat = parseFloat(input.dataset.lat);
  const lng = parseFloat(input.dataset.lng);

  if (!lat || !lng) {
    input.style.borderColor = 'var(--danger)';
    setTimeout(() => input.style.borderColor = '', 1000);
    return;
  }

  const name = nameInput.value.trim() || `אדם ${persons.length + 1}`;
  const address = input.value.trim();
  const color = AVATAR_COLORS[persons.length % AVATAR_COLORS.length];

  persons.push({ name, address, lat, lng, color });

  nameInput.value = '';
  input.value = '';
  delete input.dataset.lat;
  delete input.dataset.lng;

  renderPersons();
  updateMap();

  document.getElementById('findBtn').disabled = persons.length < 2;
}

function removePerson(i) {
  persons.splice(i, 1);
  renderPersons();
  updateMap();
  document.getElementById('findBtn').disabled = persons.length < 2;
  clearResults();
}

function renderPersons() {
  const list = document.getElementById('personsList');
  list.innerHTML = '';
  persons.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'person-card';
    card.innerHTML = `
      <div class="person-avatar" style="background:${p.color}">${p.name[0]}</div>
      <div class="person-info">
        <div class="person-name">${p.name}</div>
        <div class="person-address">${p.address}</div>
      </div>
      <button class="remove-btn" onclick="removePerson(${i})">✕</button>
    `;
    list.appendChild(card);
  });
}

function updateMap() {
  markers.forEach(m => m.setMap(null));
  markers = [];

  persons.forEach(p => {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map,
      title: p.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: p.color,
        fillOpacity: 1,
        strokeColor: '#000',
        strokeWeight: 2,
      },
      label: { text: p.name[0], color: '#000', fontSize: '11px', fontWeight: '700' }
    });
    markers.push(marker);
  });

  if (persons.length > 0) {
    const bounds = new google.maps.LatLngBounds();
    persons.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
    map.fitBounds(bounds);
  }
}

function getMidpoint() {
  const lat = persons.reduce((s, p) => s + p.lat, 0) / persons.length;
  const lng = persons.reduce((s, p) => s + p.lng, 0) / persons.length;
  return { lat, lng };
}

function findMeetingPoint() {
  if (persons.length < 2) return;

  clearResults();
  document.getElementById('loading').classList.add('show');
  document.getElementById('findBtn').disabled = true;

  const mid = getMidpoint();

  // Draw midpoint marker
  if (midMarker) midMarker.setMap(null);
  midMarker = new google.maps.Marker({
    position: mid,
    map,
    title: 'נקודת האמצע',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 14,
      fillColor: '#fff',
      fillOpacity: 0.15,
      strokeColor: '#fff',
      strokeWeight: 2,
    },
    zIndex: 10
  });

  // Draw radius circle
  new google.maps.Circle({
    map,
    center: mid,
    radius: 800,
    strokeColor: 'rgba(200,245,90,0.4)',
    strokeWeight: 1,
    fillColor: 'rgba(200,245,90,0.05)',
  });

  map.panTo(mid);
  map.setZoom(14);

  const types = ['cafe', 'restaurant', 'bar', 'park', 'shopping_mall', 'museum'];
  let allPlaces = [];
  let pending = types.length;

  types.forEach(type => {
    service.nearbySearch({
      location: mid,
      radius: 800,
      type
    }, (results, status) => {
      if (status === google.maps.places.PlacesServiceStatus.OK && results) {
        results.forEach(r => { r._type = type; });
        allPlaces = allPlaces.concat(results.slice(0, 5));
      }
      pending--;
      if (pending === 0) showResults(allPlaces, mid);
    });
  });
}

function showResults(places, mid) {
  document.getElementById('loading').classList.remove('show');
  document.getElementById('findBtn').disabled = false;

  // Deduplicate
  const seen = new Set();
  const unique = places.filter(p => {
    if (seen.has(p.place_id)) return false;
    seen.add(p.place_id); return true;
  });

  // Sort by rating
  unique.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  currentPlaces = unique;

  if (unique.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  // Build filter chips
  const types = ['הכל', ...new Set(unique.map(p => typeLabel(p._type)))];
  const chips = document.getElementById('filterChips');
  chips.innerHTML = '';
  types.forEach(t => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (t === activeFilter ? ' active' : '');
    chip.textContent = t;
    chip.onclick = () => { activeFilter = t; renderResults(currentPlaces); };
    chips.appendChild(chip);
  });

  renderResults(unique);
  document.getElementById('resultsSection').style.display = 'block';
}

function renderResults(places) {
  // update chips
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === activeFilter);
  });

  const filtered = activeFilter === 'הכל'
    ? places
    : places.filter(p => typeLabel(p._type) === activeFilter);

  // clear old markers
  resultMarkers.forEach(m => m.setMap(null));
  resultMarkers = [];

  const list = document.getElementById('resultsList');
  list.innerHTML = '';

  filtered.slice(0, 15).forEach((place, i) => {
    const icon = PLACE_TYPE_ICONS[place._type] || '📍';
    const rating = place.rating ? `⭐ ${place.rating.toFixed(1)}` : '';
    const card = document.createElement('div');
    card.className = 'result-card';
    card.dataset.placeId = place.place_id;
    card.innerHTML = `
      <div class="result-icon">${icon}</div>
      <div class="result-info">
        <div class="result-name">${place.name}</div>
        <div class="result-address">${place.vicinity || ''}</div>
        <div class="result-meta">
          ${rating ? `<span class="rating">${rating}</span>` : ''}
          <span class="tag">${typeLabel(place._type)}</span>
        </div>
        <button class="directions-btn" onclick="openDirections(event,'${place.geometry.location.lat()}','${place.geometry.location.lng()}')">
          🗺️ ניווט
        </button>
      </div>
    `;
    card.addEventListener('click', () => focusPlace(place, card));
    list.appendChild(card);

    // map marker
    const marker = new google.maps.Marker({
      position: place.geometry.location,
      map,
      title: place.name,
      icon: {
        url: `https://maps.google.com/mapfiles/ms/icons/red-dot.png`,
      },
      label: { text: (i+1).toString(), color: '#fff', fontSize: '10px', fontWeight: 'bold' }
    });
    marker.addListener('click', () => focusPlace(place, card));
    resultMarkers.push(marker);
  });
}

function focusPlace(place, card) {
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  map.panTo(place.geometry.location);
  map.setZoom(16);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function openDirections(e, lat, lng) {
  e.stopPropagation();
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
}

function clearResults() {
  resultMarkers.forEach(m => m.setMap(null));
  resultMarkers = [];
  if (midMarker) { midMarker.setMap(null); midMarker = null; }
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsList').innerHTML = '';
}

function typeLabel(type) {
  const map = {
    cafe: 'קפה', restaurant: 'מסעדה', bar: 'בר', park: 'פארק',
    shopping_mall: 'קניות', museum: 'מוזיאון', movie_theater: 'קולנוע', gym: 'ספורט'
  };
  return map[type] || type;
}

function darkMapStyle() {
  return [
    { elementType: 'geometry', stylers: [{ color: '#1a1a1a' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#1a1a1a' }] },

    { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },

}
